<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280">
  <defs>
    <linearGradient id="cwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2c20"/>
      <stop offset="1" stop-color="#1d150e"/>
    </linearGradient>
    <radialGradient id="cglow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#6b4a2a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6b4a2a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="720" height="1280" fill="url(#cwall)"/>
  <rect width="720" height="1280" fill="url(#cglow)"/>

  <!-- brick texture hint -->
  <g stroke="#241a11" stroke-width="4" opacity="0.6">
    <line x1="0" y1="300" x2="720" y2="300"/>
    <line x1="0" y1="460" x2="720" y2="460"/>
    <line x1="0" y1="620" x2="720" y2="620"/>
    <line x1="120" y1="300" x2="120" y2="460"/>
    <line x1="360" y1="300" x2="360" y2="460"/>
    <line x1="600" y1="300" x2="600" y2="460"/>
    <line x1="240" y1="460" x2="240" y2="620"/>
    <line x1="480" y1="460" x2="480" y2="620"/>
  </g>

  <!-- vault door, left (hotspot: to-vault) -->
  <g>
    <rect x="72" y="384" width="158" height="576" rx="12" fill="#2a1f15" stroke="#0f0a06" stroke-width="10"/>
    <rect x="92" y="404" width="118" height="536" rx="8" fill="#3b2c1d"/>
    <circle cx="190" cy="672" r="16" fill="#1a120b"/>
    <rect x="100" y="430" width="100" height="14" rx="4" fill="#241a11"/>
    <rect x="100" y="900" width="100" height="14" rx="4" fill="#241a11"/>
  </g>

  <!-- dusty shelf, right (hotspot: shelf) -->
  <g>
    <rect x="446" y="512" width="216" height="307" rx="6" fill="#2a1d12" stroke="#150e08" stroke-width="6"/>
    <rect x="446" y="600" width="216" height="12" fill="#150e08"/>
    <rect x="446" y="712" width="216" height="12" fill="#150e08"/>
    <!-- jars / boxes on shelves -->
    <rect x="470" y="540" width="44" height="56" rx="4" fill="#5c6b4f"/>
    <rect x="528" y="546" width="38" height="50" rx="4" fill="#6e5a3a"/>
    <circle cx="616" cy="572" r="24" fill="#4a5b66"/>
    <rect x="476" y="650" width="50" height="58" rx="4" fill="#6e5a3a"/>
    <circle cx="560" cy="680" r="26" fill="#7a5238"/>
    <rect x="600" y="654" width="40" height="54" rx="4" fill="#566049"/>
  </g>
</svg>
